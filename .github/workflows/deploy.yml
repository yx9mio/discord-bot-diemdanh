# .github/workflows/deploy.yml
# Trigger Railway redeploy khi push vào main
# Setup: thêm RAILWAY_SERVICE_ID + RAILWAY_API_TOKEN vào GitHub Secrets
#   Settings → Secrets → Actions → New repository secret
#
# Lấy RAILWAY_SERVICE_ID:
#   Railway Dashboard → Service → Settings → Service ID
# Lấy RAILWAY_API_TOKEN:
#   Railway Dashboard → Account → Tokens → Create token

name: Deploy to Railway

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Trigger Railway redeploy
    runs-on: ubuntu-latest
    # Chỉ chạy nếu CI lint pass
    needs: []

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trigger Railway redeploy
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
          RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}
        run: |
          if [ -z "$RAILWAY_API_TOKEN" ] || [ -z "$RAILWAY_SERVICE_ID" ]; then
            echo "⚠️  RAILWAY_API_TOKEN hoặc RAILWAY_SERVICE_ID chưa được set."
            echo "    Vào GitHub → Settings → Secrets → Actions để thêm."
            exit 1
          fi

          echo "🚀 Triggering Railway redeploy for service: $RAILWAY_SERVICE_ID"

          RESPONSE=$(curl -sf -X POST \
            -H "Authorization: Bearer $RAILWAY_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{ \"query\": \"mutation { serviceInstanceRedeploy(serviceId: \\\"$RAILWAY_SERVICE_ID\\\") }\" }" \
            https://backboard.railway.app/graphql/v2)

          echo "Response: $RESPONSE"

          if echo "$RESPONSE" | grep -q '"errors"'; then
            echo "❌ Railway API trả về lỗi"
            exit 1
          fi

          echo "✅ Railway redeploy triggered successfully"
