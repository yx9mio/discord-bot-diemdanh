# CI Pipeline — rebuilt
#
# Jobs:
#   lint          — ESLint --max-warnings 0, fail fast
#   test          — Vitest + coverage (needs: lint)
#   security      — gitleaks secret scan (blocks CI)
#   dep-review    — audit new deps, PR vào main only
#
# Thay đổi so với bản cũ:
#   - Tách 4 jobs độc lập thay vì 1 job to
#   - Cache node_modules bằng hash package-lock.json
#   - lint: --max-warnings 0 (warning = error)
#   - test: fail-on-error: true (fix bản cũ để false)
#   - security: bỏ continue-on-error, block CI nếu tìm thấy secret
#   - timeout-minutes cho mỗi job

name: CI

on:
  push:
    branches: [main, 'feat/**', 'fix/**', 'refactor/**', 'chore/**']
  pull_request:
    branches: [main]

# Huỷ run cũ cùng branch nếu có push mới
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Tắt cảnh báo Node.js 20 deprecated trên GitHub Actions runners
# Actions sẽ mặc định chạy Node 24 từ 16/06/2026
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # ── 1. LINT ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ESLint)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node_modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: node_modules-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Lint (ESLint — 0 warnings allowed)
        run: npm run lint -- --max-warnings 0

  # ── 2. TEST ──────────────────────────────────────────────────────────────────
  test:
    name: Test (Vitest + Coverage)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node_modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: node_modules-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Run tests (Vitest)
        run: npm test
        env:
          NODE_ENV: test
          SUPABASE_URL: http://localhost
          SUPABASE_KEY: test-key
          DISCORD_TOKEN: test-token
          CLIENT_ID: '000000000000000000'

      - name: Annotate test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Vitest Results
          path: test-results/junit.xml
          reporter: java-junit
          fail-on-error: 'true'

      - name: Upload coverage & test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_number }}
          path: |
            coverage/
            test-results/
          retention-days: 14

  # ── 3. SECURITY ──────────────────────────────────────────────────────────────
  security:
    name: Secret Scanning (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secrets (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Không có continue-on-error — block CI nếu tìm thấy secret

  # ── 4. DEPENDENCY REVIEW ─────────────────────────────────────────────────────
  dep-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
      - name: Dependency Review (audit new packages)
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: always
