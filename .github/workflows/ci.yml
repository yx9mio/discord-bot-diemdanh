# .github/workflows/ci.yml
# Chạy trên mọi push/PR vào main:
#   1. Cài dependencies
#   2. Kiểm tra syntax tất cả .js (node --check)
#   3. Dry-run require graph (không cần env thật)

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Syntax & require check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Kiểm tra syntax từng file .js (bắt SyntaxError sớm)
      - name: Check JS syntax (node --check)
        run: |
          find . -name '*.js' \
            -not -path './node_modules/*' \
            -not -path './.git/*' \
            -print0 \
          | xargs -0 node --check
          echo "✅ All .js files passed syntax check"

      # Dry-run: load toàn bộ module graph với env giả
      # Phát hiện MODULE_NOT_FOUND trước khi deploy
      - name: Dry-run module graph
        env:
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_KEY: placeholder_key_for_ci_only
          DISCORD_TOKEN: placeholder_token_for_ci_only
          NODE_ENV: test
        run: |
          node -e "
            // Load toàn bộ require graph từ index.js
            // Nếu có file thiếu sẽ throw MODULE_NOT_FOUND ngay tại đây
            try {
              require('./index.js');
            } catch (e) {
              if (e.code === 'MODULE_NOT_FOUND') {
                console.error('❌ MODULE_NOT_FOUND:', e.message);
                process.exit(1);
              }
              // Các lỗi khác (DISCORD_TOKEN invalid, v.v.) là bình thường trong CI
              console.log('ℹ️  Non-fatal startup error (expected in CI):', e.message);
            }
          "
          echo "✅ Module graph OK"
