# CI Pipeline
# Jobs:
#   lint-and-test   — ESLint + Vitest + coverage report
#   security-scan   — gitleaks secret scan
#   dependency-review — audit new deps trên PR (chỉ chạy khi có PR vào main)
name: CI

on:
  push:
    branches: [main, 'feat/**', 'fix/**', 'refactor/**', 'chore/**']
  pull_request:
    branches: [main]

# Huỷ run cũ cùng branch nếu có push mới đến
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────────────
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write        # cho phép annotate lỗi ESLint/test lên PR
      pull-requests: write # đăng comment coverage summary lên PR

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline

      # —— Lint ————————————————————————————————————
      - name: Lint (ESLint)
        run: npm run lint

      # —— Test + coverage —————————————————————————————
      # reporters + outputFile được cấu hình trong vitest.config.js
      - name: Run tests (Vitest)
        run: npm test
        env:
          NODE_ENV: test
          SUPABASE_URL: http://localhost
          SUPABASE_KEY: test-key
          DISCORD_TOKEN: test-token
          CLIENT_ID: '000000000000000000'

      # —— Annotations lỗi test lên GitHub Checks —————————————
      - name: Annotate test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Vitest Results
          path: test-results/junit.xml
          reporter: java-junit
          fail-on-error: 'false'

      # —— Upload artifacts ——————————————————————————
      - name: Upload coverage & test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_number }}
          path: |
            coverage/
            test-results/
          retention-days: 14

  # ────────────────────────────────────────────────────
  security-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history cho gitleaks

      - name: Scan for secrets (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  # ────────────────────────────────────────────────────
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
      - name: Dependency Review (audit new packages)
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: always
