# .github/workflows/ci.yml
# Chạy trên mọi push/PR vào main:
#   1. Cài dependencies
#   2. Kiểm tra syntax tất cả .js (node --check)
#   3. Chạy test suite (node:test)

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Syntax check + Unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Bước 1: Kiểm tra syntax từng file .js
      - name: Check JS syntax (node --check)
        run: |
          find . -name '*.js' \
            -not -path './node_modules/*' \
            -not -path './.git/*' \
            -print0 \
          | xargs -0 node --check
          echo "✅ All .js files passed syntax check"

      # Bước 2: Chạy toàn bộ test suite
      - name: Run tests
        env:
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_KEY: placeholder_key_for_ci_only
          DISCORD_TOKEN: placeholder_token_for_ci_only
          NODE_ENV: test
        run: |
          node --test tests/*.test.js
